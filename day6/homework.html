<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homework box sizing</title>
    <link rel="stylesheet" href="homework-style.css" />
  </head>
  <body>
    <div class="card">
      <img src="images/elephant.jpg" alt="The African Elephant" />
      <h2>Elephant</h2>
      <p>The largest animal on Earth</p>
    </div>
    <div class="card">
      <img src="images/giraffe.jpg" alt="Giraffe in Sahara Desert" />
      <h2>Giraffe</h2>
      <p>The tallest animal on Earth</p>
    </div>
    <div class="card">
      <img src="images/lion.jpg" alt="African Lion" />
      <h2>Lion</h2>
      <p>The King of animals</p>
    </div>
  </body>
</html>
