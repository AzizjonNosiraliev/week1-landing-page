<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS selectors</title>
    <style>
      body {
        background-color: whitesmoke;
      }
      #main-title {
        color: navy;
        text-align: center;
      }
      p {
        color: black;
      }
      .important {
        color: red;
        font-weight: bold;
      }
      .btn {
        margin-top: 10px;
        background-color: green;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1 id="main-title">CSS selectors</h1>
    <p>This is a normal paragraph.</p>
    <p class="important">This paragraph is important</p>
    <p class="important">This paragraph is also important</p>
    <button class="btn">Click Me</button><br />
    <button class="btn">Submit</button>
  </body>
</html>
