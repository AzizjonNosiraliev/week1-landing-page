<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS practice</title>
    <style>
      body {
        background-color: lightskyblue;
        font-family: Arial, sans-serif;
      }
      h1 {
        color: white;
        font-size: 40px;
        text-align: center;
        margin-bottom: 40px;
      }
      .global {
        color: rgb(255, 247, 0);
        font-size: 18px;
      }
      .local {
        color: blue;
        font-size: 20px;
      }
      button {
        background-color: rgb(255, 0, 217);
        padding: 15px;
        border: none;
        border-radius: 10px;
        color: white;
        cursor: pointer;
        font-size: 18px;
      }
      ul {
        color: purple;
      }
      div {
        background-color: white;
        padding: 10px;
        margin-top: 20px;
        border: 2px solid black;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>Azizjon</h1>
    <p class="global">Hello world!</p>
    <p class="global">Welcome to the CSS practice page!</p>
    <h3>Hobbies</h3>
    <ul>
      <li>driving</li>
      <li>traveling</li>
      <li>programming</li>
    </ul>
    <button>Click me!</button>
    <div>
      <p class="local">I am learning CSS</p>
    </div>
  </body>
</html>
